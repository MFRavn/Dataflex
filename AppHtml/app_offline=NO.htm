<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="robots" content="noindex,nofollow">
    <title>Sitio en Mantenimiento</title>
	<link rel="shortcut icon" href="favicon.ico" sizes="48x48" />
    <style>
        /* Reset básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 75vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 30px;
            background-color: rgba(230, 230, 230, 0.5);           
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.1), -4px -4px 10px rgba(255, 255, 255, 0.7);
        }

        .info-container {
            max-width: 600px;
            padding: 20px;            
            background-color:rgba(142, 209, 252, 0.5);
            border: 1px solid #8ed1fc;
            border-radius: 12px;
            box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.1), -4px -4px 10px rgba(255, 255, 255, 0.7);
            margin-bottom: 15px;
        }

        .error-title {
            font-size: 1.6em;
            font-weight: bold;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

		.error-subtitle {
            font-size: 1.2em;
            margin-bottom: 15px;
        }

        .error-message {
            font-size: 1em;
            color: #555;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .icon {
            font-size: 1.2em;
            color: #3528e2;
            margin-bottom: 15px;
        }

        .error-solution{
            margin-bottom: 20px;
        }

		.error-browser{
			font-size: 1.1em;
            font-weight: bold;
            color: #555;
            margin-bottom: 20px;
            line-height: 1.5;
		}

		.error-keyboard-key{
			font-size: 2em;
			border:3px solid;
			border-bottom-width: 4px;
			border-color: #ddd #bbb #bbb #ddd;
			background-color: var(--background-color-neutral-subtle,#f9f9f9);
			color: var(--color-base,#202122);
			padding: 1px 3px;
			white-space:nowrap;
			border-radius:3px;
		}

        .error-keyboard-letter{
			font-size: 2em;
			padding: 1px 3px;
			white-space:nowrap;
		}

        .bold{
            font-weight: bold;
        }
        
    </style>
</head>
<body>
    <div class="container">
        <div class="info-container">
            <div class="error-title">Sitio web en Mantenimiento</div>
		    <div class="error-subtitle"></div>
        </div>
        <div class="error-message">
            <span class="bold">Estamos realizando tareas de mantenimiento. Disculpen las molestias.</span><br>
            Por favor, vuelve más tarde.
        </div>
        <div class="error-solution">
            <!--<span class="error-keyboard-key">!</span>-->
        </div>
    </div>
</body>
</html>
